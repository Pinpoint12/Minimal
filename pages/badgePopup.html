<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Minimal</title>
		<link rel="stylesheet" href="./badgePopup.css"/>
	</head>
	<body>
		<header>
			<img src="../icons/icon.png" alt="Minimal"/>
			<h1>Minimal</h1>
		</header>
		<main>
			<div class="toggle-container">
				<label class="toggle-label" for="enable">
					<span data-i18n="minimalStyle">Minimal style</span>
					<input type="checkbox" id="enable">
					<div class="toggle-switch"></div>
				</label>
			</div>
			<div id="status" class="status"></div>
		</main>
		<footer>
			<a href="https://minimal.aupya.org" target="_blank">minimal.aupya.org</a>
		</footer>
		<script src="./badgePopup.js"></script>
	</body>
</html>
