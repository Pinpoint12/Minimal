<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Minimal</title>
		<link rel="stylesheet" href="./badgePopup.css"/>
	</head>
	<body>
		<header>
			<img src="../icons/icon.png" alt="Minimal"/>
			<h1>Minimal</h1>
		</header>

		<main>
			<div class="toggle-container">
				<label class="toggle-label" for="enable">
					<span data-i18n="minimalStyle">Minimal style</span>
					<input type="checkbox" id="enable">
					<div class="toggle-switch"></div>
				</label>
			</div>
			<div id="status" class="status"></div>

			<button id="pick-element" class="btn-picker">
				<span class="picker-icon">◎</span>
				Pick element to hide
			</button>

			<div id="site-options" class="site-options" style="display:none;">
				<div class="site-options-header">Options</div>
				<label class="option-label" id="opt-hide-view-counts" style="display:none;">
					<span>Hide view counts</span>
					<input type="checkbox" id="yt-hide-view-counts">
					<div class="toggle-switch toggle-switch-sm"></div>
				</label>
				<label class="option-label" id="opt-hide-like-counts" style="display:none;">
					<span>Hide like/dislike counts</span>
					<input type="checkbox" id="yt-hide-like-counts">
					<div class="toggle-switch toggle-switch-sm"></div>
				</label>
				<label class="option-label" id="opt-hide-comments" style="display:none;">
					<span>Hide comments</span>
					<input type="checkbox" id="yt-hide-comments">
					<div class="toggle-switch toggle-switch-sm"></div>
				</label>
				<div class="option-row" id="opt-reddit-vote-style" style="display:none;">
					<span>Vote counts</span>
					<div class="segmented-control" id="reddit-vote-style">
						<button class="seg-btn" data-value="visible">Visible</button>
						<button class="seg-btn" data-value="dots">Dots</button>
						<button class="seg-btn" data-value="hidden">Hidden</button>
					</div>
				</div>
			</div>
		</main>

		<section id="hidden-section" class="hidden-section">
			<div class="section-header" id="hidden-header">
				<span>Hidden Elements</span>
				<span class="badge" id="hidden-count">0</span>
				<span class="chevron">▼</span>
			</div>
			<div class="section-content" id="hidden-content">
				<div id="hidden-list" class="hidden-list"></div>
				<button id="clear-all-hidden" class="btn-secondary">Clear All</button>
			</div>
		</section>

		<footer>
			<span class="version">v1.8.0</span>
		</footer>

		<script src="./badgePopup.js"></script>
	</body>
</html>
