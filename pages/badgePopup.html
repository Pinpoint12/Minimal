<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Minimal</title>
		<link rel="stylesheet" href="./badgePopup.css"/>
	</head>
	<body>
		<header>
			<img src="../icons/icon.png" alt="Minimal"/>
			<h1>Minimal</h1>
		</header>

		<main>
			<div class="toggle-container">
				<label class="toggle-label" for="enable">
					<span data-i18n="minimalStyle">Minimal style</span>
					<input type="checkbox" id="enable">
					<div class="toggle-switch"></div>
				</label>
			</div>
			<div id="status" class="status"></div>
		</main>

		<section id="hidden-section" class="hidden-section">
			<div class="section-header" id="hidden-header">
				<span>Hidden Elements</span>
				<span class="badge" id="hidden-count">0</span>
				<span class="chevron">▼</span>
			</div>
			<div class="section-content" id="hidden-content">
				<div id="hidden-list" class="hidden-list"></div>
				<button id="clear-all-hidden" class="btn-secondary">Clear All</button>
			</div>
		</section>

		<footer>
			<span class="version">v1.5.0</span>
		</footer>

		<script src="./badgePopup.js"></script>
	</body>
</html>
